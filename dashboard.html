<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Pick Me</title>
  <link rel="stylesheet" href="CSS/styles.css">
  <script defer src="js/app.js"></script>
</head>
<body data-page="dashboard">
  <header class="site-header">
    <nav class="nav shell" aria-label="Primary navigation">
      <a class="brand" href="frontend.html"><span class="brand-mark">PM</span><span>Pick Me</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <div class="nav-menu" data-nav-menu>
        <a href="dashboard.html">Dashboard</a>
        <a href="favorites.html">Favorites</a>
        <a href="recent.html">Recently Viewed</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode"><span data-theme-icon>Dark</span></button>
      </div>
    </nav>
  </header>

  <main class="section-pad">
    <section class="shell dashboard-grid page-fade">
      <aside class="glass profile-panel" data-profile-panel></aside>
      <section class="dashboard-main">
        <div class="dash-head">
          <div>
            <p class="eyebrow">Your Edit</p>
            <h1 data-dashboard-title>Today's recommendation</h1>
          </div>
          <div class="dash-actions">
            <button class="btn btn-ghost" type="button" data-save-favorite>Save Favorite</button>
            <button class="btn btn-primary" type="button" data-generate>Generate Again</button>
          </div>
        </div>
        <div class="warning-stack" data-warning-stack></div>
        <div class="recommendation-grid" data-recommendation-grid></div>
      </section>
    </section>
  </main>
</body>
</html>
