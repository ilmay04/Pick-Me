<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick Me · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo">Pick<span class="dot">Me</span></a>
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="recent.html">Recent Looks</a>
        <a href="favorites.html">Favorites</a>
        <a href="#" data-logout>Logout</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><span data-theme-icon>🌙</span></button>
        <button class="nav-toggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </header>

  <main class="page container" id="dashRoot">
    <!-- Hero -->
    <section class="dash-hero">
      <div class="glass dash-welcome">
        <span class="badge">Your look for <strong id="occLabel">today</strong></span>
        <h1>Looking great, <span data-user-name>you</span> ✨</h1>
        <p class="muted">Personality: <span class="personality-tag" id="persTag">—</span></p>
        <div class="dash-actions">
          <button class="btn btn-primary" id="regenBtn">🔄 Generate Again</button>
          <button class="btn btn-ghost fav-btn" id="favBtn">🤍 Save Favorite</button>
        </div>
      </div>
      <div class="card score-card">
        <div class="score-ring" id="scoreRing" style="--val:0">
          <div class="inner"><b id="scoreVal">0</b><span>Style Score</span></div>
        </div>
        <p class="muted">How well this look fits your profile</p>
      </div>
    </section>

    <!-- Warnings -->
    <section class="mt-2">
      <h2 class="page-head" style="margin-bottom:14px">Styling notes</h2>
      <div class="warnings" id="warnings"></div>
    </section>

    <!-- Recommendation cards -->
    <section class="mt-3">
      <h2 class="page-head" style="margin-bottom:14px">Your recommendation</h2>
      <div class="rec-grid" id="recGrid"></div>
    </section>

    <!-- Personality composition -->
    <section class="card mt-3" style="padding:28px">
      <h2 style="margin-bottom:4px">Fashion Personality</h2>
      <p class="muted" style="margin-bottom:20px">The mix of styles that make up your fashion identity.</p>
      <div class="personality-bars" id="persBars"></div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/common.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
