<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Onboarding | Pick Me</title>
  <link rel="stylesheet" href="CSS/styles.css">
  <script defer src="js/app.js"></script>
</head>
<body data-page="onboarding">
  <header class="site-header">
    <nav class="nav shell" aria-label="Primary navigation">
      <a class="brand" href="frontend.html"><span class="brand-mark">PM</span><span>Pick Me</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <div class="nav-menu" data-nav-menu>
        <a href="dashboard.html">Dashboard</a>
        <a href="favorites.html">Favorites</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode"><span data-theme-icon>Dark</span></button>
      </div>
    </nav>
  </header>

  <main class="section-pad">
    <section class="shell narrow page-fade">
      <div class="section-heading">
        <p class="eyebrow">Profile Onboarding</p>
        <h1>Let us tune your first recommendation.</h1>
      </div>
      <form class="glass wizard" data-onboarding-form novalidate>
        <div class="wizard-progress" aria-hidden="true"><span data-wizard-progress></span></div>
        <div data-step-container></div>
        <p class="form-error" data-form-error role="alert"></p>
        <div class="wizard-actions">
          <button class="btn btn-ghost" type="button" data-prev-step>Back</button>
          <button class="btn btn-primary" type="button" data-next-step>Next</button>
          <button class="btn btn-primary" type="submit" data-finish-step>Finish</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
